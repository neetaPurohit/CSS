<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>navbar</title>
    <style>
       *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
       }
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 24px;
        background-color: aquamarine;
      }

      ul {
        display: flex;
        gap: 20px;
        list-style: none;
      }
      button{
        background-color: rgb(18, 84, 62);
        color: white;
        border: none;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
      }

    </style>
  </head>
  <body>
    <main>
      <nav>
        <ul>
          <li>Home</li>
          <li>About</li>
          <li>Work</li>
        </ul>
        <button>Get started</button>
      </nav>
    </main>
  </body>
</html>
